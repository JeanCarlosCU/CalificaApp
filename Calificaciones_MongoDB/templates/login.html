<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio de Sesión</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial;
            background:linear-gradient(135deg,#85f074,#0b8700);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .contenedor{
            width:400px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0px 0px 20px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#0b8700;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            border-radius:10px;
            background:#f2f2f2;
            box-sizing: border-box;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            border:none;
            border-radius:10px;
            background:#0b8700;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#004912;
        }

        p{
            text-align:center;
            color:red;
            font-weight:bold;
        }

        a{
            display:block;
            text-align:center;
            margin-top:20px;
            text-decoration:none;
            color:#0b8700;
            font-weight:bold;
        }

    </style>
</head>
<body>

    <div class="contenedor">
        <h1>Iniciar Sesión</h1>
        
        {% if mensaje %}
            <p>{{ mensaje }}</p>
        {% endif %}

        <form action="/login" method="POST">
            <input type="text" name="usuario" placeholder="Usuario" required>
            <input type="password" name="password" placeholder="Contraseña" required>
            <button type="submit">Entrar</button>
        </form>

        <a href="/registro">¿No tienes cuenta? Registrate aquí</a>
    </div>

</body>
</html>
