<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>

    <style>
        
        body{
            margin:0;
            padding:0;
            font-family:Arial;
            background:linear-gradient(135deg,#85f074,#0b8700);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }
        .contenedor{
            width:400px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0px 0px 20px rgba(0,0,0,0.2);
        }
        h1{
            text-align:center;
            color:#0b8700;
        }
        input, select{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            border-radius:10px;
            background:#f2f2f2;
            box-sizing: border-box;
        }
        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            border:none;
            border-radius:10px;
            background:#0b8700;
            color:white;
            font-size:16px;
            cursor:pointer;
        }
    </style>

</head>

<body>
    
    <div class="contenedor">
        <h1>Registro</h1>
        <p style="color:green;">{{ mensaje }}</p>
        <form action="/registro" method="POST">
            <input type="text" name="usuario" placeholder="Nombre de Usuario" required>
            <input type="password" name="password" placeholder="Contraseña" required>
            <select name="rol" required>
                <option value="alumno">Alumno</option>
                <option value="maestro">Maestro</option>
            </select>
            <input type="text" name="identificador" placeholder="Tu Matrícula (Solo Alumnos)">
            <button type="submit">Registrar</button>
        </form>
        <a href="/login" style="display:block; text-align:center; margin-top:15px; color:#0b8700; font-weight:bold; text-decoration:none;">Ir al Login</a>
    </div>
</body>

</html>
