<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calificaciones</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial;
            background:linear-gradient(135deg,#85f074,#0b8700);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }
        .contenedor{
            width:400px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0px 0px 20px rgba(0,0,0,0.2);
        }
        h1{
            text-align:center;
            color:#0b8700;
        }
    </style>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  </head>

<body>

    <div class="contenedor">
        <h1>Profesor: {{ maestro }}</h1>
        <table class="table">
          <thead>
            <tr>
              <th>Num.Lista</th>
              <th>Materia</th>
              <th>Nombre</th>
              <th>Calificacion</th>
            </tr>
          </thead>
          <tbody>
            {% for alumno in alumnos %}
            <tr {% if alumno.matricula == session.identificador %}style="background:#d4edda; font-weight:bold;"{% endif %}>
              <td>{{ loop.index }}</td>
              <td>{{ alumno.materia }}</td>
              <td>{{ alumno.nombre }}</td>
              <td>{{ alumno.nota }}</td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
        <a href="/alumnos" style="display:block; text-align:center; color:#0b8700; font-weight:bold; text-decoration:none; margin-top:20px;">Volver</a>
    </div>

</body>

</html>
